# Orchestration compose for the Logistica project.
# Brings up postgres, redis, backend (Django), worker/beat (Celery), and frontend (Vite).

# Shared environment block for every Django-based service (backend, worker, beat).
# Service-specific vars (DJANGO_DEBUG, DJANGO_ALLOWED_HOSTS, CORS_*) are added per service.
x-django-env: &django-env
  DJANGO_SETTINGS_MODULE: config.settings.dev
  DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-only-not-secret}
  DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-logistica}
  CELERY_BROKER_URL: redis://redis:6379/0
  CELERY_RESULT_BACKEND: redis://redis:6379/1
  CELERY_TASK_ALWAYS_EAGER: ${CELERY_TASK_ALWAYS_EAGER:-False}
  TRACKING_PROVIDER: ${TRACKING_PROVIDER:-apps.tracking.providers.mock.MockTrackingProvider}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost:5173}
  EMAIL_BACKEND: ${EMAIL_BACKEND:-django.core.mail.backends.console.EmailBackend}
  EMAIL_HOST: ${EMAIL_HOST:-}
  EMAIL_PORT: ${EMAIL_PORT:-587}
  EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
  EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
  EMAIL_USE_TLS: ${EMAIL_USE_TLS:-True}
  DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-no-reply@logistica.local}

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-logistica}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - logistica

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - logistica

  backend:
    build:
      context: ../logistica-backend/logistica-backend
      target: dev
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    environment:
      <<: *django-env
      DJANGO_DEBUG: ${DJANGO_DEBUG:-True}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-*}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
    volumes:
      - ../logistica-backend/logistica-backend/src:/app/src
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - logistica

  worker:
    build:
      context: ../logistica-backend/logistica-backend
      target: dev
    command: celery -A config worker -l info
    environment:
      <<: *django-env
    volumes:
      - ../logistica-backend/logistica-backend/src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - logistica

  beat:
    build:
      context: ../logistica-backend/logistica-backend
      target: dev
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      <<: *django-env
    volumes:
      - ../logistica-backend/logistica-backend/src:/app/src
    depends_on:
      - worker
    networks:
      - logistica

  frontend:
    build:
      context: ../logistica-frontend
      dockerfile: Dockerfile.dev
    environment:
      # From the host browser, the backend is reachable at localhost:8000.
      # If the frontend ever fetches from the server (SSR, etc.), it should
      # use http://backend:8000 instead.
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    volumes:
      # Bind mount for HMR. The anonymous volume on /app/node_modules
      # prevents the host's node_modules (Windows) from shadowing the
      # container's installed deps.
      - ../logistica-frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - logistica

volumes:
  postgres_data:

networks:
  logistica:
    driver: bridge
